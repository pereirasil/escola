name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: host-secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # O runner acessa o GitHub; o servidor só recebe arquivos por SSH (evita git fetch quando DNS do servidor falha).
      - name: Sync repository to server
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -qq -y sshpass openssh-client
          export SSHPASS="$SSH_PASSWORD"
          HOST="${{ secrets.SSH_HOST }}"
          USER="${{ secrets.SSH_USER }}"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -p 22 "${USER}@${HOST}" "mkdir -p /var/www/escola"
          sshpass -e rsync -avz \
            -e "ssh -o StrictHostKeyChecking=accept-new -p 22" \
            --exclude='.git' \
            ./ "${USER}@${HOST}:/var/www/escola/"

      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e

            cd /var/www/escola/backend
            rm -rf node_modules
            npm ci
            npm run build

            PORT=3003 pm2 restart escola-backend --update-env || PORT=3003 pm2 start dist/main.js --name escola-backend --instances 1
            pm2 save

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e

            cd /var/www/escola
            cat > .env.production <<'EOF'
            VITE_API_URL=https://escola.simplesmente.app/api
            EOF

            rm -rf node_modules
            npm ci
            npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0
            npm run build

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            sudo nginx -t
            sudo systemctl reload nginx
